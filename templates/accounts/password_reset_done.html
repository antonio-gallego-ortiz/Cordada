{% extends "base.html" %}

{% block title %}Correo enviado{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5 text-center">
                <span class="avatar-circle mx-auto mb-3" style="width: 3.5rem; height: 3.5rem; font-size: 1.4rem;">
                    <i class="ti ti-mail-check"></i>
                </span>
                <h1 class="h4 mb-2">Revisa tu correo</h1>
                <p class="text-muted small mb-0">
                    Si la dirección está registrada, te hemos enviado un enlace para
                    restablecer tu contraseña. Revisa también la carpeta de spam.
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
