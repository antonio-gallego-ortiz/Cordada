{% extends "base.html" %}

{% block title %}Editar perfil{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-4 text-center">Editar perfil</h1>
                <form method="post" enctype="multipart/form-data" novalidate>
                    {% csrf_token %}
                    {% include "includes/form_fields.html" %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-grow-1">Guardar cambios</button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
