{% extends "base.html" %}

{% block title %}Recuperar contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5 text-center">
                <span class="avatar-circle mx-auto mb-3" style="width: 3.5rem; height: 3.5rem; font-size: 1.4rem;">
                    <i class="ti ti-key"></i>
                </span>
                <h1 class="h4 mb-2">¿Has olvidado tu contraseña?</h1>
                <p class="text-muted small mb-4">
                    Escribe tu correo y te enviaremos un enlace para restablecerla.
                </p>
                <form method="post" novalidate class="text-start">
                    {% csrf_token %}
                    {% include "includes/form_fields.html" %}
                    <button type="submit" class="btn btn-success w-100 py-2">Enviar enlace</button>
                </form>
                <p class="mt-4 mb-0 small">
                    <a href="{% url 'login' %}"><i class="ti ti-arrow-left me-1"></i>Volver a iniciar sesión</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
