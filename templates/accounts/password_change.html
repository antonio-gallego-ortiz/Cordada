{% extends "base.html" %}

{% block title %}Cambiar contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <h1 class="h4 mb-3 text-center">Cambiar contraseña</h1>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% include "includes/form_fields.html" %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-grow-1 py-2">Guardar</button>
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
