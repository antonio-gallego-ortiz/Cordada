{% extends "base.html" %}

{% block title %}Actividades{% endblock %}

{% block content %}
<div class="p-5 mb-4 bg-white rounded-3 border text-center">
    <h1 class="display-5 fw-bold">Bienvenido/a a Cordada</h1>
    <p class="lead text-muted">
        La comunidad para organizar y descubrir actividades de montaña.
    </p>
    {% if not user.is_authenticated %}
        <a class="btn btn-success btn-lg" href="{% url 'register' %}">Únete a la comunidad</a>
    {% endif %}
</div>
{% endblock %}
