{% extends "base.html" %}

{% block title %}Eliminar actividad{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-4 text-center">
                <i class="ti ti-alert-triangle text-danger" style="font-size: 3rem;"></i>
                <h1 class="h4 my-3">¿Eliminar «{{ activity.title }}»?</h1>
                <p class="text-muted">
                    Se eliminará la actividad y todas sus inscripciones.
                    Esta acción no se puede deshacer.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                        <a href="{{ activity.get_absolute_url }}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
